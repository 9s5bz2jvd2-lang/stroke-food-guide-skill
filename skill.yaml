skill_name: 营养学 | 脑卒中食养助手 (Stroke Nutrition Guide)
version: 1.0.0
description: 营养学 Skill — 基于国家卫生健康委《成人脑卒中食养指南（2026年版）》的科普对话助手，提供脑卒中食养、营养管理、吞咽障碍、中医食疗、地区食谱等专业指导 (Nutrition Science Skill for Stroke Prevention & Recovery)
author: 王润圆（中国注册营养师，昆明医科大学营养与食品卫生学硕士）
license: MIT

source:
  title: 成人脑卒中食养指南
  edition: 2026年版
  publisher: 国家卫生健康委办公厅
  basis:
    - 《健康中国行动（2019—2030年）》
    - 《国民营养计划（2017—2030年）》
  references:
    - 《中国脑卒中防治报告（2023）》
    - 《中国卒中中心报告2022》
    - 《中国脑血管疾病分类2015》
    - 《中国卒中吞咽障碍与营养管理手册》
    - 《中国卒中肠内营养护理指南》
    - 《卒中患者吞咽障碍和营养管理的中国专家共识》
    - 《中国卒中营养标准化管理专家共识》
    - 《脑梗死中西医结合诊疗指南》
    - 《英国皇家医师学会2014卒中工作组循证指南：脑卒中二级预防通过营养和饮食改变》

creator:
  name: 王润圆
  credential: 中国注册营养师
  education: 昆明医科大学 营养与食品卫生学 硕士
  tool: WorkBuddy

triggers:
  - 脑卒中
  - 中风
  - 卒中
  - 脑梗
  - 脑出血
  - 偏瘫
  - 吞咽困难
  - 吞咽障碍
  - 呛咳
  - 脑卒中饮食
  - 卒中食谱
  - 脑卒中营养
  - 低盐饮食
  - DASH饮食
  - 洼田饮水试验
  - 痰热腑实
  - 痰瘀阻络
  - 阴虚风动
  - 气虚血瘀
  - 脑卒中康复
  - 脑卒中食养
  - 食品质地
  - 增稠剂
  - 卒中预防

conversation:
  max_context_turns: 100
  adaptive_context: true
  summary_interval: 20
  persistent_context:
    - user_profile
    - current_topic
    - consultation_history

constraints:
  - 本Skill基于国家卫生健康委发布的官方指南，所有数据和建议均有权威出处
  - 不可替代药物治疗和专业医疗诊断
  - 本指南主要适用于恢复期及后遗症期、生命体征稳定、意识清楚、无严重吞咽障碍者
  - 急性期、重症、严重吞咽困难需管饲者须在医生或临床营养师指导下个体化营养治疗
  - 食药物质需辨证选用，不可盲目进补
  - 所有补充剂使用前建议咨询临床营养师或医生
  - 引用数据时需注明来源为《成人脑卒中食养指南（2026年版）》

statement:
  purpose: |
    本Skill旨在普及脑卒中食养知识，响应全民营养周号召，
    落实《健康中国行动（2019—2030年）》和《国民营养计划（2017—2030年）》中
    关于发展传统食养服务、提升居民营养健康素养的要求，
    让权威食养指南走出文件柜，走进千家万户。
  disclaimer: |
    1. 本Skill内容全部来自《成人脑卒中食养指南（2026年版）》（国家卫生健康委办公厅发布），
       仅供食养科普参考，不可替代药物治疗和专业医疗诊断。
    2. 本指南主要适用于脑卒中恢复期及后遗症期人群，急性期、重症患者须在专业指导下治疗。
    3. 吞咽障碍评估须由专业人员进行，本Skill提供的信息仅作参考。
    4. 食药物质和营养补充剂的使用应在专业人员指导下进行，不可自行超量服用。
    5. 合并高血压、糖尿病、肾病等基础疾病者，须在专业医师和营养指导人员指导下辨证施膳。
    6. 本Skill由AI辅助构建，虽力求忠实原文，但不排除存在转述偏差，
       如有疑义请以指南正式出版物原文为准。
